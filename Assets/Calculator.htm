<!DOCTYPE html><html><head><title>Calculator Frame Page - By Aman Kashyap (27921)</title><style>body{margin:0;font-family:Arial;background:#f5f5f5;display:flex;justify-content:center;align-items:center;height:100vh}.calc{width:320px}.display-input{font-size:18px;margin-bottom:5px}.display-result{font-size:26px;text-align:right;margin-bottom:15px}.clear{background:#f08080;height:40px;width:80px;border:none;margin-bottom:20px;cursor:pointer}.grid{display:grid;grid-template-columns:repeat(4,1fr)}button{height:30px;font-size:18px;border:1px solid #444;cursor:pointer}.num{background:#ccc}.op{background:orange}button:hover{opacity:.85}</style></head><body><div class="calc"><button class="clear" onclick="clearAll()">C</button><div class="display-input" id="input"></div><div class="display-result" id="result">0</div><div class="grid"><button class="num" onclick="press('7')">7</button> <button class="num" onclick="press('8')">8</button> <button class="num" onclick="press('9')">9</button> <button class="op" onclick="press('/')">/</button> <button class="num" onclick="press('4')">4</button> <button class="num" onclick="press('5')">5</button> <button class="num" onclick="press('6')">6</button> <button class="op" onclick="press('*')">*</button> <button class="num" onclick="press('1')">1</button> <button class="num" onclick="press('2')">2</button> <button class="num" onclick="press('3')">3</button> <button class="op" onclick="press('-')">-</button> <button class="num" onclick="press('0')">0</button> <button class="num" onclick="press('.')">.</button> <button class="op" onclick="calculate()">=</button> <button class="op" onclick="press('+')">+</button></div></div><script>let input = "";let displayLine = "";let newInput = false;function format(val){if (Number.isInteger(val)) return val.toString();return val.toString();}function prec(op) {if (op === '+' || op === '-') return 1;if (op === '*' || op === '/') return 2;return 0;}function apply(a, b, op) {if (op === '+') return a + b;if (op === '-') return a - b;if (op === '*') return a * b;if (op === '/') return b !== 0 ? a / b : 0;}function evaluate(expr){let values = [];let ops = [];for (let i = 0; i < expr.length; i++) {if (!isNaN(expr[i]) || expr[i] === '.') {let num = "";while (i < expr.length && (!isNaN(expr[i]) || expr[i] === '.')) {num += expr[i++];}i--;values.push(parseFloat(num));}else {while (ops.length &&prec(ops[ops.length - 1]) >= prec(expr[i])) {let b = values.pop();let a = values.pop();let op = ops.pop();values.push(apply(a, b, op));}ops.push(expr[i]);}}while (ops.length){let b = values.pop();let a = values.pop();let op = ops.pop();values.push(apply(a, b, op));}return values.pop();}function updateDisplay(){document.getElementById("input").innerText = input;document.getElementById("result").innerText = displayLine || (input || "0");}function press(val){if (newInput && !"+-*/".includes(val)) {input = "";newInput = false;}if (val === ".") {let parts = input.split(/[\+\-\*\/]/);if (parts[parts.length - 1].includes(".")) return;}if ("+-*/".includes(val)) {if (input === "") return;if ("+-*/".includes(input.slice(-1))) {input = input.slice(0, -1) + val;}else {input += val;}newInput = false;updateDisplay();return;}input += val;updateDisplay();}function calculate() {if (!input) return;try {let result = evaluate(input);let formatted = format(result);displayLine = input + " = " + formatted;input = formatted;newInput = true;}catch{displayLine = "Error";input = "";}updateDisplay();}function clearAll() {input = "";displayLine = "";newInput = false;updateDisplay();}updateDisplay();</script></body></html>
