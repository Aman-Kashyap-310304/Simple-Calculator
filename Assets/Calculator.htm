<!DOCTYPE html>
<html>
<head>
<style>

body {
    margin: 0;
    font-family: Arial;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CALCULATOR CONTAINER */
.calc {
    width: 320px;
}

/* DISPLAY */
.display-input {
    font-size: 18px;
    margin-bottom: 5px;
}

.display-result {
    font-size: 26px;
    text-align: right;
    margin-bottom: 15px;
}

/* CLEAR BUTTON */
.clear {
    background: #f08080;
    width: 80px;
    height: 40px;
    border: none;
    margin-bottom: 20px;
    cursor: pointer;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
}

button {
    height: 70px;
    font-size: 18px;
    border: 1px solid #444;
    cursor: pointer;
}

/* COLORS */
.num {
    background: #ccc;
}

.op {
    background: orange;
}

button:hover {
    opacity: 0.85;
}

</style>
</head>

<body>

<div class="calc">

    <!-- CLEAR -->
    <button class="clear" onclick="clearAll()">C</button>

    <!-- DISPLAY -->
    <div class="display-input" id="input"></div>
    <div class="display-result" id="result">0</div>

    <!-- BUTTONS -->
    <div class="grid">

        <button class="num" onclick="press('7')">7</button>
        <button class="num" onclick="press('8')">8</button>
        <button class="num" onclick="press('9')">9</button>
        <button class="op" onclick="press('/')">/</button>

        <button class="num" onclick="press('4')">4</button>
        <button class="num" onclick="press('5')">5</button>
        <button class="num" onclick="press('6')">6</button>
        <button class="op" onclick="press('*')">*</button>

        <button class="num" onclick="press('1')">1</button>
        <button class="num" onclick="press('2')">2</button>
        <button class="num" onclick="press('3')">3</button>
        <button class="op" onclick="press('-')">-</button>

        <button class="num" onclick="press('0')">0</button>
        <button class="num" onclick="press('.')">.</button>
        <button class="op" onclick="calculate()">=</button>
        <button class="op" onclick="press('+')">+</button>

    </div>

</div>

<script>

// ================= STATE =================
let input = "";
let displayLine = "";
let newInput = false;

// ================= FORMAT =================
function format(val) {
    if (Number.isInteger(val)) return val.toString();
    return val.toString();
}

// ================= PRECEDENCE =================
function prec(op) {
    if (op === '+' || op === '-') return 1;
    if (op === '*' || op === '/') return 2;
    return 0;
}

// ================= APPLY =================
function apply(a, b, op) {
    if (op === '+') return a + b;
    if (op === '-') return a - b;
    if (op === '*') return a * b;
    if (op === '/') return b !== 0 ? a / b : 0;
}

// ================= EVALUATE =================
function evaluate(expr) {

    let values = [];
    let ops = [];

    for (let i = 0; i < expr.length; i++) {

        if (!isNaN(expr[i]) || expr[i] === '.') {
            let num = "";
            while (i < expr.length && (!isNaN(expr[i]) || expr[i] === '.')) {
                num += expr[i++];
            }
            i--;
            values.push(parseFloat(num));
        }
        else {
            while (ops.length &&
                   prec(ops[ops.length - 1]) >= prec(expr[i])) {

                let b = values.pop();
                let a = values.pop();
                let op = ops.pop();

                values.push(apply(a, b, op));
            }
            ops.push(expr[i]);
        }
    }

    while (ops.length) {
        let b = values.pop();
        let a = values.pop();
        let op = ops.pop();
        values.push(apply(a, b, op));
    }

    return values.pop();
}

// ================= UPDATE UI =================
function updateDisplay() {
    document.getElementById("input").innerText = input;
    document.getElementById("result").innerText = displayLine || (input || "0");
}

// ================= INPUT =================
function press(val) {

    // reset after result if number
    if (newInput && !"+-*/".includes(val)) {
        input = "";
        newInput = false;
    }

    // prevent multiple dots
    if (val === ".") {
        let parts = input.split(/[\+\-\*\/]/);
        if (parts[parts.length - 1].includes(".")) return;
    }

    // operator handling
    if ("+-*/".includes(val)) {

        if (input === "") return;

        if ("+-*/".includes(input.slice(-1))) {
            input = input.slice(0, -1) + val;
        } else {
            input += val;
        }

        newInput = false;
        updateDisplay();
        return;
    }

    input += val;
    updateDisplay();
}

// ================= CALCULATE =================
function calculate() {

    if (!input) return;

    try {
        let result = evaluate(input);
        let formatted = format(result);

        displayLine = input + " = " + formatted;
        input = formatted;
        newInput = true;

    } catch {
        displayLine = "Error";
        input = "";
    }

    updateDisplay();
}

// ================= CLEAR =================
function clearAll() {
    input = "";
    displayLine = "";
    newInput = false;
    updateDisplay();
}

// INIT
updateDisplay();

</script>

</body>
</html>
